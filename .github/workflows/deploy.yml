name: Publish Python Package to PyPI

on:
  release:
    types: [published]
  # Adds a "Run workflow" button in the GitHub Actions tab for manual deployments
  workflow_dispatch:

jobs:
  pypi-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest

    # Specifies the environment matching what you configured on PyPI
    environment:
      name: pypi
      url: https://pypi.org/p/python-ppa/

    permissions:
      # IMPORTANT: This permission is mandatory for PyPI Trusted Publishing (OIDC)
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package distributions
        run: |
          python -m build

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1